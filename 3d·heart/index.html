<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>惊喜网页</title>
<style>
body, html {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden;
  font-family:"微软雅黑", sans-serif;
  background: radial-gradient(circle, #ffffff 20%, #ffc0cb 100%);
  position: relative;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* 初始按钮 */
#startBtn {
  font-size:6vw;
  font-weight:bold;
  color:#ffd700;
  text-shadow: 0 0 10px #fff,0 0 20px #ff0;
  cursor:pointer;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  0% { text-shadow:0 0 10px #fff,0 0 20px #ff0; }
  50% { text-shadow:0 0 20px #fff,0 0 40px #ff0; }
  100% { text-shadow:0 0 30px #fff,0 0 60px #ff0; }
}

/* 隐藏主要内容，点击后显示 */
#mainContent { display:none; width:100%; height:100%; position:absolute; top:0; left:0; }
#text { position:absolute; top:30%; width:100%; text-align:center; font-size:5vw; font-weight:bold; color:#ffd700; text-shadow:0 0 5px #fff,0 0 10px #fff,0 0 20px #ff0,0 0 30px #ff0; animation: glow 2s infinite alternate, breathe 2s infinite alternate; z-index:3; }
@keyframes breathe {0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);}}
.bounce-img { position:absolute; width:200px; height:200px; z-index:2; transition: transform 0.2s; }
#fireworks { position:absolute; top:0; left:0; width:100%; height:100%; z-index:1; pointer-events:none; }
</style>
</head>
<body>

<!-- 初始交互按钮 -->
<div id="startBtn">点我有惊喜</div>

<!-- 主内容 -->
<div id="mainContent">
  <div id="text">早上好，美丽的冉冉姐</div>
  <canvas id="fireworks"></canvas>
  <audio id="bgAudio" src="musi.mp3" loop></audio>
</div>

<script>
// 获取元素
const startBtn = document.getElementById('startBtn');
const mainContent = document.getElementById('mainContent');
const audio = document.getElementById('bgAudio');

// 点击按钮触发惊喜
startBtn.addEventListener('click', ()=>{
  startBtn.style.display = 'none'; // 隐藏按钮
  mainContent.style.display = 'block'; // 显示主内容
  audio.play().catch(()=>{}); // 播放音乐

  initPage(); // 初始化动画
});

// 初始化动画函数
function initPage(){
  // -------- 弹跳图片 --------
  const imgSrc = 'background.jpg';
  const imgCount = 8;
  const images = [];

  for(let i=0;i<imgCount;i++){
    const img = document.createElement('img');
    img.src = imgSrc;
    img.className = 'bounce-img';
    mainContent.appendChild(img);

    const x = Math.random() * (window.innerWidth - 200);
    const y = Math.random() * (window.innerHeight - 200);
    img.style.left = x + 'px';
    img.style.top = y + 'px';

    const speedX = (Math.random()*4 + 1) * (Math.random() < 0.5 ? 1 : -1);
    const speedY = (Math.random()*4 + 1) * (Math.random() < 0.5 ? 1 : -1);

    images.push({el: img, x, y, speedX, speedY});
  }

  images.forEach(obj=>{
    obj.el.addEventListener('click', ()=>{
      obj.el.style.transform = 'scale(1.3)';
      setTimeout(()=>{obj.el.style.transform='scale(1)';},300);
    });
  });

  function animateImages(){
    images.forEach(obj => {
      obj.x += obj.speedX;
      obj.y += obj.speedY;
      if(obj.x <=0 || obj.x >= window.innerWidth - 200) obj.speedX *= -1;
      if(obj.y <=0 || obj.y >= window.innerHeight - 200) obj.speedY *= -1;
      obj.el.style.left = obj.x + 'px';
      obj.el.style.top = obj.y + 'px';
    });
    requestAnimationFrame(animateImages);
  }
  animateImages();

  // -------- 烟花效果 --------
  const canvas = document.getElementById('fireworks');
  const ctx = canvas.getContext('2d');
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const particles = [];

  function createFirework(x, y) {
    const count = Math.floor(Math.random()*20+30);
    for(let i=0;i<count;i++){
      const angle = Math.random()*Math.PI*2;
      const speed = Math.random()*5+2;
      const vx = Math.cos(angle)*speed;
      const vy = Math.sin(angle)*speed;
      const color = `hsl(${Math.random()*360},100%,70%)`;
      particles.push({x,y,vx,vy,color,life:100});
    }
  }

  function animateFireworks(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x,p.y,2,0,Math.PI*2);
      ctx.fill();
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05;
      p.life--;
      if(p.life <=0) particles.splice(i,1);
    }
    requestAnimationFrame(animateFireworks);
  }
  animateFireworks();

  // 鼠标移动触发烟花
  document.body.addEventListener('mousemove', (e)=>{
    if(Math.random()<0.2) createFirework(e.clientX,e.clientY);
  });

  // 响应式
  window.addEventListener('resize', ()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  });
}
</script>

</body>
</html>
